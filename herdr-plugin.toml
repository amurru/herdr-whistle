id = "herdr-whistle"
name = "Herdr Whistle"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Telegram bot for remote herdr agent management - list, read, send, and restart agents via Telegram"
platforms = ["linux", "macos"]

[[actions]]
id = "start"
title = "Start Telegram bot"
contexts = ["workspace"]
command = ["./herdr-whistle", "start"]

[[actions]]
id = "stop"
title = "Stop Telegram bot"
contexts = ["workspace"]
command = ["./herdr-whistle", "stop"]

# Auto-start on first workspace use after herdr server boot. The start
# subcommand is a no-op if an instance is already running (canonical flock).
[[events]]
on = "workspace.created"
command = ["./herdr-whistle", "start"]

[[events]]
on = "workspace.focused"
command = ["./herdr-whistle", "start"]
